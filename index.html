<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WikiShootMe PT Clone - Mobile Ready</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; }

        /* Aumentado o z-index para 1001 para que a dropdown de pesquisa passe por cima do filtro */
        #controls {
            position: absolute; top: 20px; right: 20px; z-index: 1001;
            background: white; padding: 15px; border-radius: 12px;
            box-sizing: border-box;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15); width: 260px;
            transition: background 0.3s, color 0.3s;
        }

        /* --- Filter UI --- */
        #filterControl {
            position: absolute; top: 180px; right: 20px; left: auto; z-index: 1000;
            background: white; border-radius: 12px; box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
            width: 260px; box-sizing: border-box; transition: background 0.3s, color 0.3s;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .filter-header { 
            display: flex; align-items: center; gap: 8px; padding: 12px 15px; 
            cursor: pointer; background: #f9f9f9; border-bottom: 1px solid #eee; 
            user-select: none;
        }
        .filter-header:hover { background: #f0f0f0; }
        #filterList { padding: 10px 15px; display: flex; flex-direction: column; gap: 10px; max-height: 50vh; overflow-y: auto; }
        .filter-item { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; font-weight: 600; }
        .filter-color-box { width: 14px; height: 14px; border-radius: 4px; display: inline-block; border: 1px solid rgba(0,0,0,0.1); flex-shrink: 0; }
        
        .dark-ui { background: #1e1e1e !important; color: #f5f5f5; }
        #filterControl.dark-ui { background: #1e1e1e; color: #f5f5f5; }
        #filterControl.dark-ui .filter-header { background: #2a2a2a; border-bottom-color: #333; }
        #filterControl.dark-ui .filter-header:hover { background: #333; }
        #filterControl.dark-ui .filter-color-box { border-color: rgba(255,255,255,0.2); }

        /* --- Search Bar UI --- */
        .search-container { position: relative; margin-bottom: 12px; }
        #searchInput {
            width: 100%; padding: 10px 10px 10px 36px; border: 1px solid #ccc;
            border-radius: 8px; font-family: 'Inter', sans-serif; font-size: 14px;
            box-sizing: border-box; background: #f9f9f9; color: #111; outline: none; transition: border-color 0.2s;
        }
        #searchInput:focus { border-color: #3498db; }
        .dark-ui #searchInput { background: #2a2a2a; border-color: #444; color: #eee; }
        .dark-ui #searchInput:focus { border-color: #3498db; }

        .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #888; font-size: 20px; pointer-events: none; }
        .search-results {
            position: absolute; top: 100%; left: 0; width: 100%; background: white;
            border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.25);
            max-height: 400px; overflow-y: auto; z-index: 2000; display: none; margin-top: 8px;
        }
        .dark-ui .search-results { background: #222; border: 1px solid #444; }

        .search-category-title {
            font-size: 11px; font-weight: 800; text-transform: uppercase;
            padding: 8px 12px 4px; color: #888; background: #f9f9f9; position: sticky; top: 0; z-index: 2;
        }
        .dark-ui .search-category-title { background: #2a2a2a; color: #777; }

        .search-item { display: flex; align-items: center; padding: 10px 12px; cursor: pointer; border-bottom: 1px solid #eee; gap: 10px; transition: background 0.15s; }
        .dark-ui .search-item { border-bottom-color: #333; }
        .search-item:hover { background: #f0f0f0; }
        .dark-ui .search-item:hover { background: #333; }
        .search-item:last-child { border-bottom: none; }

        .search-item-img { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; background: #ddd; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .dark-ui .search-item-img { background: #444; }

        .search-item-info { display: flex; flex-direction: column; overflow: hidden; }
        .search-item-title { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .search-item-desc { font-size: 11px; color: #777; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .dark-ui .search-item-desc { color: #aaa; }

        /* --- Buttons & UI Structure --- */
        .control-row { display: flex; gap: 8px; margin-bottom: 12px; }
        button {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 10px; cursor: pointer; background: #f0f0f0;
            color: #111; border: none; border-radius: 8px; flex: 1;
            font-family: 'Inter', sans-serif; font-weight: 600; transition: background 0.2s; font-size: 13px;
        }
        button:hover { background: #e4e4e4; }
        .dark-ui button { background: #333; color: white; }
        .dark-ui button:hover { background: #444; }

        #status { font-size: 14px; display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- Dynamic Map Pins --- */
        .custom-pin { border: 2px solid white; border-radius: 50%; box-shadow: 0 3px 6px rgba(0, 0, 0, 0.4); box-sizing: border-box; display: flex; align-items: center; justify-content: center; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .custom-pin:hover { transform: scale(1.4); }
        
        .admin-pin { background-color: #3498db; border-width: 3px; opacity: 0.65; }
        .dark-map .admin-pin { background-color: #2980b9; border-color: rgba(255, 255, 255, 0.3); }
        
        .other-pin { background-color: #ff4757; }
        .demolished-pin { background-color: #666; border-color: #ccc; }
        .dark-map .demolished-pin { background-color: #444; border-color: #888; }
        .nature-pin { background-color: #2ecc71; }
        .dark-map .nature-pin { background-color: #27ae60; }
        .metro-pin { background-color: #e74c3c; }
        .religion-pin { background-color: #9b59b6; }
        .assoc-pin { background-color: #1abc9c; }
        .sport-pin { background-color: #e67e22; }
        .art-pin { background-color: #e84393; }
        .school-pin { background-color: #f1c40f; }

        /* --- Coherent, Flexible Popups --- */
        .leaflet-popup-content-wrapper { border-radius: 12px; }
        .dark-map .leaflet-popup-content-wrapper, .dark-map .leaflet-popup-tip { background: #252525; color: #eee; }
        .leaflet-popup-content { width: 240px !important; margin: 16px; display: flex; flex-direction: column; font-family: 'Inter', sans-serif; }
        .popup-title { text-align: center; font-size: 15px; font-weight: 800; margin-bottom: 6px; line-height: 1.3; }
        .popup-categories { font-size: 11px; color: #777; text-transform: uppercase; font-weight: 600; text-align: center; margin-bottom: 12px; line-height: 1.3; }
        .dark-map .popup-categories { color: #aaa; }
        
        /* Placeholder styling added */
        .popup-img-container { 
            width: 100%; height: 160px; margin-bottom: 14px; background: #e0e0e0; 
            border-radius: 8px; display: flex; align-items: center; justify-content: center; 
            overflow: hidden; color: #888; position: relative; 
        }
        .dark-map .popup-img-container { background: #3a3a3a; color: #aaa; }
        .popup-img { 
            width: 100%; height: 100%; object-fit: cover; position: relative; 
            z-index: 2; opacity: 0; transition: opacity 0.3s ease; 
        }
        
        .popup-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: auto; }
        .popup-btn { display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; font-size: 13px; font-weight: 600; padding: 8px 12px; border-radius: 8px; color: white !important; transition: filter 0.2s; }
        .popup-btn:hover { filter: brightness(1.15); }
        .btn-wikidata { background: #006699; }
        .btn-wikipedia { background: #444444; }
        .btn-commons { background: #009966; }
        .demolished-tag { color: #ff4757; font-size: 11px; font-weight: 800; text-transform: uppercase; text-align: center; margin-bottom: 6px; }

        /* =========================================
           MOBILE RESPONSIVENESS (Media Queries)
           ========================================= */
        @media (max-width: 600px) {
            #controls {
                top: 10px; right: 10px; left: 10px; width: auto; /* Adapta-se ao ecrã */
                padding: 12px;
            }
            #filterControl {
                top: 155px; /* Fica por baixo do #controls em vez de fixo aos 180px */
                right: 10px; left: 10px; width: auto;
            }
            #filterList {
                max-height: 40vh; /* Para garantir que o mapa fica visível */
            }
            .search-results {
                max-height: 45vh; 
            }
        }
    </style>
</head>

<body>

    <div id="controls">
        <div class="search-container">
            <span class="material-symbols-outlined search-icon">search</span>
            <input type="text" id="searchInput" placeholder="Pesquisar em Portugal..." autocomplete="off">
            <div id="searchResults" class="search-results"></div>
        </div>

        <div class="control-row">
            <button id="langToggle"><span class="material-symbols-outlined">translate</span> <span id="langText">PT</span></button>
            <button id="themeToggle"><span class="material-symbols-outlined" id="themeIcon">dark_mode</span> <span id="themeText">Tema</span></button>
        </div>
        
        <div id="status"><span class="material-symbols-outlined">explore</span><span id="statusText">Pronto a explorar</span></div>
    </div>

    <div id="filterControl">
        <div class="filter-header" id="filterToggle">
            <span class="material-symbols-outlined">filter_alt</span>
            <span style="flex:1; font-weight:700; font-size:14px;" id="filterTitleText">Filtros</span>
            <span class="material-symbols-outlined" id="filterIcon">expand_less</span>
        </div>
        <div id="filterList">
            </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        /* =========================================
           I18N DICTIONARY & STATE
           ========================================= */
        const i18n = {
            pt: {
                searchPlaceholder: "Pesquisar em Portugal...",
                theme: "Tema",
                lang: "EN", 
                ready: "Pronto a explorar",
                scanning: "A analisar a área...",
                mapUpdated: "Mapa atualizado",
                error: "Erro de rede",
                noResults: "Nenhum resultado com coordenadas encontrado.",
                catCities: "Cidades e Freguesias",
                catSites: "Locais e Monumentos",
                noDesc: "Sem descrição disponível",
                demolished: "Demolido / Destruído",
                btnCommons: "Commons",
                btnWiki: "Wikipedia",
                btnData: "Wikidata",
                filtersTitle: "Filtros",
                filters: {
                    admin: "Administrativo", nature: "Natureza (Praias, Geologia...)", metro: "Metro", 
                    demolished: "Demolido", religion: "Religioso", assoc: "Associações", 
                    sport: "Desporto / Estádios", art: "Arte / Murais", school: "Escolas", 
                    other: "Edifícios e Outros"
                }
            },
            en: {
                searchPlaceholder: "Search Portugal...",
                theme: "Theme",
                lang: "PT",
                ready: "Ready to explore",
                scanning: "Scanning area...",
                mapUpdated: "Map updated",
                error: "Network error",
                noResults: "No results found with coordinates.",
                catCities: "Cities & Parishes",
                catSites: "Sites & Monuments",
                noDesc: "No description available",
                demolished: "Demolished / Destroyed",
                btnCommons: "Commons",
                btnWiki: "Wikipedia",
                btnData: "Wikidata",
                filtersTitle: "Filters",
                filters: {
                    admin: "Administrative", nature: "Nature (Beaches, Geology...)", metro: "Metro", 
                    demolished: "Demolished", religion: "Religious", assoc: "Associations", 
                    sport: "Sports / Stadiums", art: "Art / Murals", school: "Schools", 
                    other: "Buildings & Other"
                }
            }
        };

        let currentLang = 'pt'; 
        let pendingPopupId = null; 

        const filterCategoriesList = ['admin', 'nature', 'metro', 'demolished', 'religion', 'assoc', 'sport', 'art', 'school', 'other'];
        const filterColors = {
            admin: "#3498db", nature: "#2ecc71", metro: "#e74c3c", demolished: "#666",
            religion: "#9b59b6", assoc: "#1abc9c", sport: "#e67e22", art: "#e84393",
            school: "#f1c40f", other: "#ff4757"
        };
        const layerGroups = {};

        function updateUILocale() {
            const t = i18n[currentLang];
            document.getElementById('searchInput').placeholder = t.searchPlaceholder;
            document.getElementById('themeText').innerText = t.theme;
            document.getElementById('langText').innerText = t.lang;
            document.getElementById('filterTitleText').innerText = t.filtersTitle;
            
            const statusText = document.getElementById('statusText');
            if(statusText.innerText === i18n.pt.ready || statusText.innerText === i18n.en.ready) {
                statusText.innerText = t.ready;
            }

            filterCategoriesList.forEach(cat => {
                const labelElement = document.getElementById(`filter-label-${cat}`);
                if (labelElement) labelElement.innerText = t.filters[cat];
            });
        }

        /* =========================================
           MAP INITIALIZATION & FILTERS
           ========================================= */
        // Iniciamos com zoomControl: false para podermos colocá-lo no bottomright (evitando sobreposição com os menus em Mobile)
        const map = L.map('map', { zoomControl: false }).setView([38.7223, -9.1393], 14);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        map.createPane('adminPane'); map.getPane('adminPane').style.zIndex = 300; 
        map.createPane('sitePane'); map.getPane('sitePane').style.zIndex = 400;  
        map.createPane('highlightPane'); map.getPane('highlightPane').style.zIndex = 500; 

        const lightModeUrl = 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
        const darkModeUrl = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
        const attribution = '&copy; OSM &copy; CARTO';

        let isDarkMode = false; 
        let currentTileLayer = L.tileLayer(lightModeUrl, { attribution: attribution }).addTo(map);

        function applyTheme() {
            const body = document.getElementById('controls');
            const filterContainer = document.getElementById('filterControl');
            const mapContainer = document.getElementById('map');
            if (isDarkMode) {
                body.classList.add('dark-ui'); 
                filterContainer.classList.add('dark-ui');
                mapContainer.classList.add('dark-map');
                document.getElementById('themeIcon').innerText = "light_mode";
            } else {
                body.classList.remove('dark-ui'); 
                filterContainer.classList.remove('dark-ui');
                mapContainer.classList.remove('dark-map');
                document.getElementById('themeIcon').innerText = "dark_mode";
            }
        }
        applyTheme();

        document.getElementById('themeToggle').addEventListener('click', () => {
            map.removeLayer(currentTileLayer);
            isDarkMode = !isDarkMode;
            currentTileLayer = L.tileLayer(isDarkMode ? darkModeUrl : lightModeUrl, { attribution: attribution }).addTo(map);
            applyTheme();
        });

        /* --- Filter Layer Management --- */
        const filterListEl = document.getElementById('filterList');
        filterCategoriesList.forEach(cat => {
            layerGroups[cat] = L.layerGroup().addTo(map);
            const labelEl = document.createElement('label');
            labelEl.className = 'filter-item';
            labelEl.innerHTML = `
                <input type="checkbox" value="${cat}" checked>
                <span class="filter-color-box" style="background-color: ${filterColors[cat]}"></span>
                <span id="filter-label-${cat}"></span>
            `;
            const checkbox = labelEl.querySelector('input');
            checkbox.addEventListener('change', (e) => {
                if (e.target.checked) map.addLayer(layerGroups[cat]);
                else map.removeLayer(layerGroups[cat]);
            });
            filterListEl.appendChild(labelEl);
        });

        const filterToggleEl = document.getElementById('filterToggle');
        const filterIconEl = document.getElementById('filterIcon');
        filterToggleEl.addEventListener('click', () => {
            if (filterListEl.style.display === 'none') {
                filterListEl.style.display = 'flex';
                filterIconEl.innerText = 'expand_less';
            } else {
                filterListEl.style.display = 'none';
                filterIconEl.innerText = 'expand_more';
            }
        });

        function clearAllLayers() {
            Object.values(layerGroups).forEach(group => group.clearLayers());
        }

        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'pt' ? 'en' : 'pt';
            updateUILocale();
            loadedItems.clear();
            clearAllLayers();
            fetchWikidata(); 
        });

        updateUILocale();

        /* =========================================
           SEARCH LOGIC
           ========================================= */
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        let searchTimeout;

        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const query = e.target.value.trim();
            if (query.length < 3) { searchResults.style.display = 'none'; return; }
            searchTimeout = setTimeout(() => performSearch(query), 400);
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const firstResult = searchResults.querySelector('.search-item');
                if (firstResult && searchResults.style.display === 'block') {
                    firstResult.click();
                } else {
                    const query = searchInput.value.trim();
                    if (query.length >= 3) performSearch(query);
                }
            }
        });

        function performSearch(query) {
            const statusIcon = document.querySelector('#status .material-symbols-outlined');
            statusIcon.innerText = "sync"; statusIcon.classList.add("loading-spinner");

            const searchUrl = `https://www.wikidata.org/w/api.php?action=wbsearchentities&search=${encodeURIComponent(query)}&language=${currentLang}&format=json&origin=*`;

            fetch(searchUrl)
                .then(res => res.json())
                .then(data => {
                    const results = data.search;
                    if (!results || results.length === 0) { renderSearchResults([], []); return null; }

                    const qIds = results.map(r => `wd:${r.id}`).join(' ');
                    
                    const sparqlQuery = `
                        SELECT ?item ?location ?image WHERE {
                            VALUES ?item { ${qIds} }
                            ?item wdt:P625 ?location.
                            FILTER EXISTS { {?item wdt:P17 wd:Q45} UNION {VALUES ?item {wd:Q45}} }
                            OPTIONAL { ?item wdt:P18 ?image. }
                        }
                    `;

                    return fetch('https://query.wikidata.org/sparql?query=' + encodeURIComponent(sparqlQuery), { headers: { 'Accept': 'application/sparql-results+json' } })
                        .then(res => res.json()).then(sparqlData => {
                            return { restResults: results, sparqlData: sparqlData.results.bindings };
                        });
                })
                .then(combined => {
                    if (!combined) return;
                    statusIcon.classList.remove("loading-spinner");
                    statusIcon.innerText = "check_circle";

                    const coordMap = new Map();
                    combined.sparqlData.forEach(row => {
                        const id = row.item.value.split('/').pop(); 
                        coordMap.set(id, { loc: row.location.value, img: row.image ? row.image.value : null });
                    });

                    const cities = []; const sites = [];
                    const cityKeywords = ['freguesia', 'município', 'concelho', 'cidade', 'vila', 'distrito', 'aldeia', 'país', 'city', 'town', 'village', 'parish', 'municipality', 'county'];

                    combined.restResults.forEach(item => {
                        if (coordMap.has(item.id)) {
                            const geo = coordMap.get(item.id);
                            const match = geo.loc.match(/Point\(([^ ]+) ([^ ]+)\)/);
                            
                            if (match) {
                                const obj = {
                                    id: item.id, 
                                    fullUrl: `http://www.wikidata.org/entity/${item.id}`, 
                                    name: item.label, desc: item.description || '',
                                    image: geo.img ? geo.img + "?width=72" : null,
                                    lat: parseFloat(match[2]), lng: parseFloat(match[1])
                                };

                                const isCity = cityKeywords.some(kw => obj.desc.toLowerCase().includes(kw));
                                if (isCity && cities.length < 5) cities.push(obj);
                                else if (!isCity && sites.length < 10) sites.push(obj);
                            }
                        }
                    });
                    renderSearchResults(cities, sites);
                })
                .catch(err => {
                    console.error(err); statusIcon.classList.remove("loading-spinner"); statusIcon.innerText = "error";
                });
        }

        function renderSearchResults(cities, sites) {
            const t = i18n[currentLang];
            if (cities.length === 0 && sites.length === 0) {
                searchResults.innerHTML = `<div style="padding: 15px; font-size: 13px; text-align: center; color: #888;">${t.noResults}</div>`;
                searchResults.style.display = 'block'; return;
            }

            let html = '';
            if (cities.length > 0) {
                html += `<div class="search-category-title">${t.catCities}</div>`;
                cities.forEach(city => html += buildSearchItemHTML(city, 'location_city', t.noDesc));
            }
            if (sites.length > 0) {
                html += `<div class="search-category-title">${t.catSites}</div>`;
                sites.forEach(site => html += buildSearchItemHTML(site, 'push_pin', t.noDesc));
            }

            searchResults.innerHTML = html; searchResults.style.display = 'block';

            document.querySelectorAll('.search-item').forEach(el => {
                el.addEventListener('click', function() {
                    pendingPopupId = this.getAttribute('data-full-id');
                    map.flyTo([parseFloat(this.getAttribute('data-lat')), parseFloat(this.getAttribute('data-lng'))], 17, { animate: true, duration: 1.5 });
                    searchResults.style.display = 'none'; 
                    searchInput.value = this.querySelector('.search-item-title').innerText;
                });
            });
        }

        function buildSearchItemHTML(item, fallbackIcon, noDescFallback) {
            const imgHTML = item.image ? `<img src="${item.image}" class="search-item-img">` : `<div class="search-item-img"><span class="material-symbols-outlined" style="font-size:20px; color:#aaa;">${fallbackIcon}</span></div>`;
            return `
                <div class="search-item" data-full-id="${item.fullUrl}" data-lat="${item.lat}" data-lng="${item.lng}">
                    ${imgHTML}
                    <div class="search-item-info">
                        <div class="search-item-title">${item.name}</div>
                        <div class="search-item-desc">${item.desc || noDescFallback}</div>
                    </div>
                </div>`;
        }

        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) searchResults.style.display = 'none';
        });

        /* =========================================
           MAP FETCHING LOGIC
           ========================================= */
        const loadedItems = new Set();

        function fetchWikidata() {
            const t = i18n[currentLang];
            const fallbackLang = currentLang === 'pt' ? 'en' : 'pt'; 

            const statusIcon = document.querySelector('#status .material-symbols-outlined');
            const statusText = document.getElementById('statusText');

            statusIcon.innerText = "sync"; statusIcon.classList.add("loading-spinner");
            statusText.innerText = t.scanning;

            const bounds = map.getBounds();
            const southWest = bounds.getSouthWest();
            const northEast = bounds.getNorthEast();

            const sparqlQuery = `
                SELECT DISTINCT ?item ?itemLabel ?location ?image ?article ?commonsCat ?typeLabel ?isDemolished ?isAdmin ?isNature ?isMetro ?extCatStr WHERE {
                  SERVICE wikibase:box {
                    ?item wdt:P625 ?location.
                    bd:serviceParam wikibase:cornerSouthWest "Point(${southWest.lng} ${southWest.lat})"^^geo:wktLiteral.
                    bd:serviceParam wikibase:cornerNorthEast "Point(${northEast.lng} ${northEast.lat})"^^geo:wktLiteral.
                  }
                  OPTIONAL { ?item wdt:P18 ?image. }
                  OPTIONAL { ?item wdt:P373 ?commonsCat. }
                  OPTIONAL { ?article schema:about ?item ; schema:isPartOf <https://${currentLang}.wikipedia.org/> . }
                  OPTIONAL { ?item wdt:P31 ?type. }
                  
                  OPTIONAL { { ?item wdt:P31 wd:Q56556915. } UNION { ?item wdt:P31 wd:Q12308110. } UNION { ?item wdt:P576 ?end. } UNION { ?item wdt:P3001 ?demo. } BIND("true" AS ?isDemolished) }
                  OPTIONAL { { ?item wdt:P31 wd:Q1131296. } UNION { ?item wdt:P31 wd:Q676050. } UNION { ?item wdt:P31 wd:Q1136442. } UNION { ?item wdt:P31 wd:Q123705. } UNION { ?item wdt:P31 wd:Q56061. } BIND("true" AS ?isAdmin) }
                  
                  OPTIONAL {
                    VALUES ?natType { wd:Q22698 wd:Q1107656 wd:Q16509618 wd:Q2303886 wd:Q4022 wd:Q52062847 wd:Q1510380 wd:Q40080 wd:Q8502 wd:Q46831 wd:Q734036 wd:Q46622 wd:Q473972 wd:Q175171 wd:Q35509 wd:Q1552554 wd:Q215282 }
                    ?item wdt:P31 ?natType.
                    BIND("true" AS ?isNature)
                  }
                  
                  OPTIONAL { { ?item wdt:P31 wd:Q928830. } BIND("true" AS ?isMetro) }
                  
                  OPTIONAL {
                    ?item wdt:P31 ?extType.
                    VALUES (?extType ?extCatStr) {
                      (wd:Q16970 "religion") (wd:Q32815 "religion") (wd:Q108325 "religion") (wd:Q2977 "religion") (wd:Q44613 "religion") (wd:Q34147 "religion")
                      (wd:Q15942952 "assoc") (wd:Q48204 "assoc") (wd:Q43229 "assoc")
                      (wd:Q483110 "sport") (wd:Q1076444 "sport") (wd:Q4117366 "sport") (wd:Q207714 "sport")
                      (wd:Q219423 "art") (wd:Q20437094 "art")
                      (wd:Q3914 "school") (wd:Q3918 "school") (wd:Q9842 "school") (wd:Q9750 "school") (wd:Q2385804 "school")
                      (wd:Q41176 "building") (wd:Q811979 "building")
                    }
                  }

                  SERVICE wikibase:label { bd:serviceParam wikibase:language "${currentLang},${fallbackLang}". }
                } LIMIT 500
            `;

            fetch('https://query.wikidata.org/sparql?query=' + encodeURIComponent(sparqlQuery), { headers: { 'Accept': 'application/sparql-results+json' } })
                .then(response => response.json())
                .then(data => {
                    const places = new Map();

                    data.results.bindings.forEach(row => {
                        const id = row.item.value;
                        if (!places.has(id)) {
                            places.set(id, {
                                id: id, name: row.itemLabel?.value || 'Unknown',
                                location: row.location.value, image: row.image?.value,
                                article: row.article?.value, commonsCat: row.commonsCat?.value,
                                isDemolished: !!row.isDemolished, isAdmin: !!row.isAdmin,
                                isNature: !!row.isNature, isMetro: !!row.isMetro,
                                extCategories: new Set(),
                                categories: new Set()
                            });
                        }
                        if (row.typeLabel && !row.typeLabel.value.startsWith('http')) {
                            places.get(id).categories.add(row.typeLabel.value);
                        }
                        if (row.extCatStr) {
                            places.get(id).extCategories.add(row.extCatStr.value);
                        }
                    });

                    places.forEach(place => {
                        if (loadedItems.has(place.id)) return;

                        const match = place.location.match(/Point\(([^ ]+) ([^ ]+)\)/);
                        if (match) {
                            loadedItems.add(place.id);
                            const lng = parseFloat(match[1]);
                            const lat = parseFloat(match[2]);

                            let popupContent = ``;
                            if (place.isDemolished) popupContent += `<div class="demolished-tag">${t.demolished}</div>`;
                            popupContent += `<div class="popup-title">${place.name}</div>`;

                            if (place.categories.size > 0) popupContent += `<div class="popup-categories">${Array.from(place.categories).join(' • ')}</div>`;
                            
                            if (place.image) {
                                const thumbUrl = place.image + "?width=400";
                                popupContent += `
                                    <div class="popup-img-container">
                                        <span class="material-symbols-outlined" style="position: absolute; z-index: 1; font-size: 32px; opacity: 0.5;">image</span>
                                        <img src="${thumbUrl}" class="popup-img" loading="lazy" onload="this.style.opacity=1">
                                    </div>`;
                            }

                            popupContent += `<div class="popup-buttons">`;
                            if (place.commonsCat) popupContent += `<a href="https://commons.wikimedia.org/wiki/Category:${encodeURIComponent(place.commonsCat)}?uselang=${currentLang}" target="_blank" class="popup-btn btn-commons"><span class="material-symbols-outlined" style="font-size:16px;">collections</span> ${t.btnCommons}</a>`;
                            if (place.article) popupContent += `<a href="${place.article}" target="_blank" class="popup-btn btn-wikipedia"><span class="material-symbols-outlined" style="font-size:16px;">article</span> ${t.btnWiki}</a>`;
                            popupContent += `<a href="${place.id}?uselang=${currentLang}" target="_blank" class="popup-btn btn-wikidata"><span class="material-symbols-outlined" style="font-size:16px;">database</span> ${t.btnData}</a></div>`;

                            let category = 'other';
                            let iconClass = 'custom-pin';
                            let iconSize = [16, 16]; 
                            let html = ''; 
                            let activePane = 'sitePane';

                            if (place.isMetro) category = 'metro';
                            else if (place.isAdmin) category = 'admin';
                            else if (place.isNature) category = 'nature';
                            else if (place.isDemolished) category = 'demolished';
                            else if (place.extCategories.has('religion')) category = 'religion';
                            else if (place.extCategories.has('assoc')) category = 'assoc';
                            else if (place.extCategories.has('sport')) category = 'sport';
                            else if (place.extCategories.has('art')) category = 'art';
                            else if (place.extCategories.has('school')) category = 'school';

                            if (category === 'metro') { iconClass = 'custom-pin metro-pin'; activePane = 'highlightPane'; }
                            else if (category === 'admin') { iconClass = 'custom-pin admin-pin'; iconSize = [33, 33]; activePane = 'adminPane'; } 
                            else if (category === 'nature') { iconClass = 'custom-pin nature-pin'; activePane = 'highlightPane'; }
                            else if (category === 'demolished') { iconClass = 'custom-pin demolished-pin'; }
                            else if (category === 'religion') { iconClass = 'custom-pin religion-pin'; }
                            else if (category === 'assoc') { iconClass = 'custom-pin assoc-pin'; }
                            else if (category === 'sport') { iconClass = 'custom-pin sport-pin'; }
                            else if (category === 'art') { iconClass = 'custom-pin art-pin'; }
                            else if (category === 'school') { iconClass = 'custom-pin school-pin'; }
                            else { iconClass = 'custom-pin other-pin'; }

                            const dynamicIcon = L.divIcon({ className: iconClass, html: html, iconSize: iconSize, iconAnchor: [iconSize[0] / 2, iconSize[1] / 2], popupAnchor: [0, -iconSize[1] / 2], tooltipAnchor: [(iconSize[0] / 2) + 2, 0] });
                            const marker = L.marker([lat, lng], { icon: dynamicIcon, pane: activePane });
                            
                            marker.bindTooltip(place.name, { direction: 'right', offset: [10, 0] });
                            marker.bindPopup(popupContent);
                            marker.on('click', function () { this.closeTooltip(); });
                            marker.on('popupopen', function () { this.closeTooltip(); });

                            layerGroups[category].addLayer(marker);

                            if (pendingPopupId === place.id) {
                                setTimeout(() => marker.openPopup(), 100); 
                                pendingPopupId = null; 
                            }
                        }
                    });

                    statusIcon.classList.remove("loading-spinner");
                    statusIcon.innerText = "check_circle"; statusText.innerText = t.mapUpdated;
                })
                .catch(error => {
                    console.error('Error:', error);
                    statusIcon.classList.remove("loading-spinner");
                    statusIcon.innerText = "error"; statusText.innerText = t.error;
                });
        }

        let fetchTimeout;
        map.on('moveend', () => { clearTimeout(fetchTimeout); fetchTimeout = setTimeout(fetchWikidata, 800); });
        fetchWikidata();
    </script>
</body>
</html>
